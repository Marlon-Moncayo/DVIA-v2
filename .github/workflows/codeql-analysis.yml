name: "CodeQL"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  analyze:
    runs-on: macos-latest
    strategy:
      matrix:
        language: [ 'swift' ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Build Swift (iOS)
        run: |
          xcodebuild -workspace DVIA-v2/DVIA-v2.xcworkspace -scheme DVIA-v2 -sdk iphonesimulator

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
