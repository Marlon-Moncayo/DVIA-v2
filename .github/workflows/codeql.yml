name: "CodeQL Analysis"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    - cron: '0 3 * * 1'

jobs:
  analyze:
    name: Analyze (swift)
    runs-on: macos-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show DVIA-v2 folder contents
        run: ls -la DVIA-v2

      - name: Install CocoaPods dependencies
        working-directory: DVIA-v2
        run: |
          if [ -f "Podfile" ]; then
            pod install --repo-update
          fi

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: swift
          queries: security-extended,security-and-quality

      - name: Build project manually
        working-directory: DVIA-v2
        run: |
          set -e
          xcodebuild -list -workspace DVIA-v2.xcworkspace || xcodebuild -list -project DVIA-v2.xcodeproj

          xcodebuild clean build \
            -workspace DVIA-v2.xcworkspace \
            -scheme DVIA-v2 \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:swift"
