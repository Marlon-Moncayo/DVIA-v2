name: "CodeQL Analysis"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    - cron: '0 3 * * 1'

jobs:
  analyze:
    name: Analyze (swift)
    runs-on: macos-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install CocoaPods dependencies
        run: |
          if [ -f "Podfile" ]; then
            pod install --repo-update
          fi

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: swift
          queries: security-extended,security-and-quality

      # Build manual en lugar de autobuild — clave para que CodeQL indexe el código
      - name: Build project manually
        run: |
          set -e
          # Lista lo que hay para confirmar nombres exactos de workspace/scheme
          ls -la
          xcodebuild -list -workspace DVIA-v2.xcworkspace || xcodebuild -list -project DVIA-v2.xcodeproj

          xcodebuild clean build \
            -workspace DVIA-v2.xcworkspace \
            -scheme DVIA-v2 \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:swift"
